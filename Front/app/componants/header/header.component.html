<!-- Modern Navigation Bar Start -->
<div class="modern-navbar">
  <div class="nav-container">
    <div class="nav-content">
      
      <!-- Brand Section -->
      <div class="brand-section">
        <a routerLink="/products" class="brand-link">
          <div class="brand-icon">
            <i class="fas fa-utensils"></i>
          </div>
          <span class="brand-text">Restoo</span>
        </a>
      </div>

      <!-- Navigation Links -->
      <div class="nav-links">
        <a routerLink="/products" class="nav-link">Products</a>
        <a routerLink="/chefs" class="nav-link">Chefs</a>
        <a routerLink="/contact-info" class="nav-link">Contact</a>
        <a routerLink="/dashboard" class="nav-link">Dashboard</a>
      </div>

      <!-- Right Section -->
      <div class="nav-right">
        <!-- New Search Bar -->
        <div class="group">
          <svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><g><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path></g></svg>
          <input 
            placeholder="Search products..." 
            type="search" 
            class="input"
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            (input)="onSearch()"
            name="search">
        </div>

        <!-- Auth Buttons -->
        <div class="auth-buttons">
          <a *ngIf="!isUserLoggedIn()" routerLink="/login" class="auth-btn login-btn">
            Login
          </a>
          <a *ngIf="!isUserLoggedIn()" routerLink="/signup" class="auth-btn signup-btn">
            Get Started
            <i class="fas fa-arrow-up-right"></i>
          </a>
        </div>

        <!-- Shopping Cart -->
        <div class="cart-icon" *ngIf="isUserLoggedIn()">
          <app-card></app-card>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Profile, Orders and Logout Buttons Outside Container -->
  <div class="profile-orders-logout-container" *ngIf="isUserLoggedIn()">
    <!-- Profile Button -->
    <button routerLink="/profile" class="Btn profile-btn">
      <div class="sign">
        <svg viewBox="0 0 24 24">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div class="text">Profile</div>
    </button>
    
    <!-- Orders Button -->
    <button routerLink="/orders" class="Btn orders-btn">
      <div class="sign">
        <svg viewBox="0 0 24 24">
          <path d="M7 4V2C7 1.45 7.45 1 8 1H16C16.55 1 17 1.45 17 2V4H20C20.55 4 21 4.45 21 5S20.55 6 20 6H19V19C19 20.1 18.1 21 17 21H7C5.9 21 5 20.1 5 19V6H4C3.45 6 3 5.55 3 5S3.45 4 4 4H7ZM9 3V4H15V3H9ZM7 6V19H17V6H7Z"/>
        </svg>
      </div>
      <div class="text">Orders</div>
    </button>
    
    <!-- Logout Button -->
    <button (click)="logout()" class="Btn logout-btn">
      <div class="sign">
        <svg viewBox="0 0 512 512">
          <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
        </svg>
      </div>
      <div class="text">Logout</div>
    </button>
  </div>
</div>
<!-- Modern Navigation Bar End -->
