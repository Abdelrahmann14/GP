  <!-- Team Start -->
<div class="container-xxl pt-5 pb-3 d-flex justify-content-center align-items-center">
  <div class="container">
    <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
      <h5 class="section-title ff-secondary text-center text-primary fw-normal">Team Members</h5>
      <h1 class="mb-5">Our Master Chefs</h1>
    </div>

    <div class="row g-4">
      <div class="col-lg-3 col-md-6 wow fadeInUp" *ngFor="let ch of chefs" data-wow-delay="0.5s">
        <div class="team-item">
          <div class="rounded-circle overflow-hidden ">
            <img class="img-fluid" src="assets/img/{{ch.logoPath}}" alt="">
          </div>
          <h5 class="mb-0">{{ch.name}}</h5>
          <small>{{ch.spec}}</small>
          <div class="d-flex justify-content-center mt-3">
            <a class="btn btn-square btn-primary mx-1" href="{{ch.faceLink}}"><i class="fab fa-facebook-f"></i></a>
            <a class="btn btn-square btn-primary mx-1" href="{{ch.tweLink}}"><i class="fab fa-twitter"></i></a>
            <a class="btn btn-square btn-primary mx-1" href="{{ch.instaLink}}"><i class="fab fa-instagram"></i></a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
